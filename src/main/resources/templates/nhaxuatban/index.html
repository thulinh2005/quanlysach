<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Danh mục nhà xuất bản</h3>

            <div class="d-flex gap-2">
                <input type="text" id="searchInput" class="form-control shadow-sm"
                    placeholder="Nhập tên nhà xuất bản..."
                    style="border-radius: 8px; width: 250px;">

                <button class="btn btn-primary btn-primary-custom"
                        data-bs-toggle="modal"
                        data-bs-target="#addModal">
                    <i class="bi bi-plus-lg me-2"></i>Thêm nhà xuất bản
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-3">Mã</th>
                            <th>Tên nhà xuất bản</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm nhà xuất bản</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="tenNxb" class="form-control" placeholder="Tên nhà xuất bản">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="addNXB()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Sửa nhà xuất bản</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <input id="editTen" class="form-control">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning" onclick="updateNXB()">Cập nhật</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/nhaxuatban.js}"></script>
</body>
</html>
