<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thư viện HAU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #b22222;
        }

        /* Màu đỏ đặc trưng HAU */
        .card-img-top {
            height: 250px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">QUẢN LÝ THƯ VIỆN KIẾN TRÚC - HAU</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Danh mục sách hiện có</h2>
        <div class="row">
            <div class="col-md-3 mb-4" th:each="sach : ${danhSachSach}">
                <div class="card h-100 shadow-sm">
                    <img th:src="@{'/images/' + ${sach.biaSach}}" class="card-img-top" alt="Bìa sách">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${sach.tenSach}">Tên sách</h5>
                        <p class="card-text text-muted">
                            Tác giả: <span th:text="${sach.tacGia.tenTacGia}">Tác giả</span><br>
                            Số lượng: <span th:text="${sach.soLuong}">0</span>
                        </p>
                        <a href="#" class="btn btn-outline-danger w-100">Xem vị trí (Bản đồ)</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
