<div th:fragment="modal-edit" class="modal fade" id="editMuonTraModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
    
    <div class="modal-header">
        <h5 class="modal-title fw-bold">Sửa thông tin mượn</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>

    <form th:action="@{/muontra/sua}" method="post">

        <div class="modal-body">

            <input type="hidden" name="maMuon" id="edit-maMuon">

            <div class="mb-3">
                <label>Nhân viên</label>
                <select name="maNv" id="edit-maNv" class="form-select">
                    <option th:each="nv : ${danhSachNhanVien}" 
                            th:value="${nv.maNv}" 
                            th:text="${nv.tenNhanVien}">
                    </option>
                </select>
            </div>

            <div id="edit-sach-container"></div>

            <button type="button" class="btn btn-sm btn-primary" onclick="addEditRow()">
                + Thêm sách
            </button>

            <div class="mt-3">
                <label>Trạng thái</label>
                <select name="trangThai" id="edit-trangThai" class="form-select">
                    <option value="DANG_MUON">Đang mượn</option>
                    <option value="DA_TRA">Đã trả</option>
                    <option value="QUA_HAN">Quá hạn</option>
                </select>
            </div>

        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-warning">Cập nhật</button>
        </div>

    </form>
</div>

    </div>
</div>
