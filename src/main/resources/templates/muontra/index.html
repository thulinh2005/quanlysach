<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Quản lý Mượn - Trả sách</h3>
            <div class="d-flex gap-2">
                <div class="d-flex gap-2">
                    <select id="searchCategory" class="form-select shadow-sm">
                        <option value="2">Độc giả</option> <option value="4">Tên sách</option> <option value="8">Trạng thái</option> </select>

                    <input type="text" id="searchInput" class="form-control shadow-sm" placeholder="Nhập từ khóa..."
                        style="border-radius: 8px; width: 200px;">
                </div>
                <button class="btn btn-primary btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addMuonTraModal">
                    <i class="bi bi-plus-lg me-2"></i>Lập phiếu mượn
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tableMuonTra">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-3">Mã</th>
                            <th>Độc giả</th>
                            <th>Nhân viên</th>
                            <th>Tên sách</th>
                            <th>SL</th>
                            <th>Ngày mượn</th>
                            <th>Ngày trả</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>

<tbody>
    <tr th:each="mt : ${danhSachMuonTra}">
        <td class="ps-3 fw-bold" th:text="${mt.maMuon}"></td>
        <td th:text="${mt.docGia != null ? mt.docGia.tenDocGia : ''}"></td>
        <td th:text="${mt.nhanVien != null ? mt.nhanVien.tenNhanVien : ''}"></td>
        
        <td>
            <div th:each="ct : ${mt.chiTiets}" class="mb-1">
                <span class="badge bg-info text-dark" th:text="${ct.sach?.tenSach}"></span>
            </div>
        </td>
        
        <td class="text-center">
            <div th:each="ct : ${mt.chiTiets}" class="mb-1">
                <span th:text="${ct.soLuong}"></span>
            </div>
        </td>

        <td th:text="${#temporals.format(mt.ngayMuon, 'dd/MM/yyyy')}"></td>
        <td th:text="${mt.ngayTra != null ? #temporals.format(mt.ngayTra, 'dd/MM/yyyy') : '-'}"></td>
        
        <td>
            <span th:if="${mt.trangThai == 'DANG_MUON'}" class="badge bg-warning text-dark">Đang mượn</span>
            <span th:if="${mt.trangThai == 'DA_TRA'}" class="badge bg-success">Đã trả</span>
            <span th:if="${mt.trangThai == 'QUA_HAN'}" class="badge bg-danger">Quá hạn</span>
        </td>
        
        <td class="text-center">
            <div class="btn-group gap-2">
                    <a href="#" class="text-warning edit-btn" 
                    data-bs-toggle="modal" data-bs-target="#editMuonTraModal"
                    th:data-id="${mt.maMuon}"
                    th:data-manv="${mt.nhanVien != null ? mt.nhanVien.maNv : ''}"
                    th:data-trangthai="${mt.trangThai}"
                    th:data-sachids="${mt.chiTiets != null ? #strings.listJoin(mt.chiTiets.![sach.maSach], ',') : ''}"
                    th:data-soluongs="${mt.chiTiets != null ? #strings.listJoin(mt.chiTiets.![soLuong], ',') : ''}">
                        
                        <i class="bi bi-pencil-square fs-5"></i>
                    </a>
                <a th:href="@{'/muontra/xoa/' + ${mt.maMuon}}" class="text-danger" 
                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                    <i class="bi bi-trash-fill fs-5"></i>
                </a>
            </div>
        </td>
    </tr>
</tbody>

                </table>
            </div>
        </div>
    </div>


    <div th:replace="~{muontra/modal-add :: modal-add}"></div>
    <div th:replace="~{muontra/modal-edit :: modal-edit}"></div>
    <div th:replace="~{muontra/modal-view :: modal-view}"></div>

    <div id="sach-options-template" style="display:none;">
        <option th:each="s : ${danhSachSach}" 
                th:value="${s.maSach}" 
                th:text="${s.tenSach}">
        </option>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/muontra.js}"></script>

</body>
</html>
