spring.application.name=quanlysach

spring.datasource.url=jdbc:mysql://localhost:3306/quanlysach
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Cho phép upload file dung lượng lớn hơn (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cảnh báo: MySQL8Dialect đã cũ, em nên đổi thành dòng này cho chuẩn Spring Boot mới
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect